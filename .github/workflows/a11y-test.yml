name: BrowserStack A11Y Tests
on: [push]
jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - uses: actions/setup-java@v3
        with:
          java-version: '11'
          distribution: 'temurin'
      - name: Resolve dependencies and set javaagent path
        run: mvn dependency:resolve dependency:properties
      - name: Run accessibility tests (with javaagent debug)
        env:
          BROWSERSTACK_USERNAME: ${{ secrets.BROWSERSTACK_USERNAME }}
          BROWSERSTACK_ACCESS_KEY: ${{ secrets.BROWSERSTACK_ACCESS_KEY }}
        run: |
          mvn test -Dconfig.file=WikipediaSearchAndArticleTest.java -X 2>&1 | grep -E "javaagent|accessibility|A11Y|BrowserStack SDK|browserstack" | head -50
          mvn test -Dconfig.file=WikipediaSearchAndArticleTest.java
